name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: ./node_modules/.bin/prisma generate

      - name: Validate Prisma schema
        run: ./node_modules/.bin/prisma validate

      - name: Run predeploy checks
        run: node scripts/predeploy.mjs --skip-env-check

      - name: Security audit
        run: npm audit --production

      - name: Build API server
        run: npm run build --workspace=artifacts/api-server

      - name: Build NeXTrade frontend
        run: npm run build --workspace=artifacts/nextrade

      - name: Build Admin Portal
        run: npm run build --workspace=artifacts/admin-portal
